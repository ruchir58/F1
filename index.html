<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Ticket Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: url('https://i.pinimg.com/736x/6c/e0/b5/6ce0b5bc785de4cb803daba52fcb399b.jpg') no-repeat center center fixed; 
            background-size: cover; 
            margin: 0; 
            padding: 0; 
        }
        .profile-pic-section {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.85);
            padding: 10px 18px 10px 10px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .profile-pic-section img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d32f2f;
            margin-right: 12px;
        }
        .profile-pic-section .profile-name {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }
        header { background: #d32f2f; color: #fff; padding: 20px 0; text-align: center; }
        main { max-width: 500px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
        label { display: block; margin: 15px 0 5px; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #d32f2f; color: #fff; border: none; padding: 12px 20px; border-radius: 4px; font-size: 16px; cursor: pointer; align-items: center; }
        button:hover { background: #9c0303; }
        .footer { text-align: center; color: #888; margin: 30px 0 0; }
    </style>
    <!-- Profile Picture Section -->
    <div class="profile-pic-section" style="width: 15%; height: 10%;">
        <img src="https://i.pinimg.com/736x/77/5b/a1/775ba11e1e97a51e7069cf3ce234fac9.jpg" alt="Profile Picture">
        <span class="profile-name">ISSYOBOIMOANA</span>
    </div>
</head>
<body>
    <header>
        <h1>F1 Ticket Booking</h1>
        <p>Book your tickets for the next Formula 1 Grand Prix!</p>
    </header>
    <main>
        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <label for="race">Select Race</label>
            <select id="race" name="race" required>
                <option value="">--Choose a Grand Prix--</option>
                <option value="monaco">Monaco Grand Prix</option>
                <option value="silverstone">British Grand Prix</option>
                <option value="monza">Italian Grand Prix</option>
                <option value="spa">Belgian Grand Prix</option>
                <option value="singapore">Singapore Grand Prix</option>
            </select>

            <label for="tickets">Number of Tickets</label>
            <input type="number" id="tickets" name="tickets" min="1" max="10" required>

            <label for="category">Ticket Category</label>
            <select id="category" name="category" required>
                <option value="">--Select Category--</option>
                <option value="general">General Admission</option>
                <option value="grandstand">Grandstand</option>
                <option value="vip">VIP</option>
            </select>

            <button type="submit">Book Now</button>
        </form>
    </main>
    <div class="footer">
        &copy; 2024 F1 Ticket Booking. All rights reserved.
    </div>
</body>
</html>
